server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name itvzlet2.ai-qwerty.ru;

    ssl_certificate /var/lib/docker/volumes/amnezia-cascade-exit_certbot_conf/_data/live/itvzlet2.ai-qwerty.ru/fullchain.pem;
    ssl_certificate_key /var/lib/docker/volumes/amnezia-cascade-exit_certbot_conf/_data/live/itvzlet2.ai-qwerty.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location = /itvzlet {
        return 302 /itvzlet/;
    }

    location /itvzlet/ {
        proxy_pass https://127.0.0.1:2095/itvzlet/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name itvzlet2.ai-qwerty.ru;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /itvzlet;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        default_type text/plain;
        return 404 "not found\n";
    }
}
