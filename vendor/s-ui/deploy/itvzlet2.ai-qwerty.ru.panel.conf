# nginx (контейнер): itvzlet2.ai-qwerty.ru — зеркало на корне + s-ui под /itvzlet/
# Установка: docker cp … nginx:/etc/nginx/conf.d/panel.conf && docker exec nginx nginx -t && docker exec nginx nginx -s reload
# s-ui: webPath=/itvzlet/. Если s-ui с TLS (том LE как у nginx) — upstream https ниже; иначе замените на http://172.17.0.1:2095/itvzlet/

server {
    listen 80;
    server_name itvzlet2.ai-qwerty.ru;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name itvzlet2.ai-qwerty.ru;
    ssl_certificate /etc/letsencrypt/live/itvzlet2.ai-qwerty.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/itvzlet2.ai-qwerty.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location = /itvzlet {
        return 302 /itvzlet/;
    }

    # s-ui с тем же LE, что в томе nginx: бэкенд слушает HTTPS на 2095
    location /itvzlet/ {
        proxy_pass https://172.17.0.1:2095/itvzlet/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name itvzlet2.ai-qwerty.ru;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /itvzlet;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        resolver 8.8.8.8 valid=300s ipv6=off;
        set $mhost "www.heise.de";
        proxy_pass https://$mhost;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name $mhost;
        proxy_set_header Host $mhost;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_read_timeout 60s;
    }
}
