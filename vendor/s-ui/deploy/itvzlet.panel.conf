# Активный vhost для контейнера nginx (Amnezia WG-Easy): itvzlet.ai-qwerty.ru
# Установка: docker cp itvzlet.panel.conf nginx:/etc/nginx/conf.d/panel.conf && docker exec nginx nginx -t && docker exec nginx nginx -s reload
# s-ui: webPath в БД = /itvzlet/ (скрипт set_webpath_itvzlet_once.py). Upstream: 172.17.0.1 = шлюз Docker bridge → хост (s-ui в host network :2095).

server {
    listen 80;
    server_name itvzlet.ai-qwerty.ru;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name itvzlet.ai-qwerty.ru;
    ssl_certificate /etc/letsencrypt/live/itvzlet.ai-qwerty.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/itvzlet.ai-qwerty.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location /api/ {
        proxy_pass http://amnezia-wg-easy:51821/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /panel {
        return 302 /panel/;
    }

    location /panel/ {
        proxy_pass http://amnezia-wg-easy:51821/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /itvzlet {
        return 302 /itvzlet/;
    }

    # s-ui с TLS (тот же LE, что в томе Amnezia): upstream по IP — проверку сертификата отключаем.
    location /itvzlet/ {
        proxy_pass https://172.17.0.1:2095/itvzlet/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name itvzlet.ai-qwerty.ru;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /itvzlet;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        resolver 8.8.8.8 valid=300s ipv6=off;
        set $mhost "www.heise.de";
        proxy_pass https://$mhost;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name $mhost;
        proxy_set_header Host $mhost;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_read_timeout 60s;
    }
}
