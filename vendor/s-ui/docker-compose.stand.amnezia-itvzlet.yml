# VPS-only: общий том Let’s Encrypt с Amnezia (контейнер nginx). Имя тома см. `docker volume ls | grep certbot_conf`.
# Панель и подписка — HTTPS на 2095/2096 с тем же сертификатом, что и nginx.
# Деплой: в run.env задать SUI_RUN_COMPOSE_FILE=docker-compose.stand.amnezia-itvzlet.yml
#
# Без тома amnezia-wg-easy-entry_certbot_conf compose up завершится ошибкой — используйте обычный docker-compose.stand.yml.
---
services:
  s-ui-local:
    image: s-ui-local-hiddify
    container_name: s-ui-local
    build:
      context: .
      dockerfile: Dockerfile
      additional_contexts:
        core: ../../hiddify-core/hiddify-sing-box
      args:
        BUILDKIT_INLINE_CACHE: "1"
    hostname: "s-ui-local"
    network_mode: host
    environment:
      SUI_WEB_TLS_CERT: /etc/letsencrypt/live/itvzlet.ai-qwerty.ru/fullchain.pem
      SUI_WEB_TLS_KEY: /etc/letsencrypt/live/itvzlet.ai-qwerty.ru/privkey.pem
      SUI_SUB_TLS_CERT: /etc/letsencrypt/live/itvzlet.ai-qwerty.ru/fullchain.pem
      SUI_SUB_TLS_KEY: /etc/letsencrypt/live/itvzlet.ai-qwerty.ru/privkey.pem
    volumes:
      - "./db:/app/db"
      - "./cert:/app/cert"
      - "amnezia_certbot_conf:/etc/letsencrypt:ro"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    tty: true
    restart: unless-stopped
    entrypoint: "./entrypoint.sh"

volumes:
  amnezia_certbot_conf:
    external: true
    name: amnezia-wg-easy-entry_certbot_conf
