# Stand: s-ui с host network + том Let's Encrypt (персистентный) + опциональный renew и HUP панели.
# Порядок: DNS A на VPS → первичная выдача certbot (порт 80 свободен) → docker compose up -d.
#
# Профили Compose:
#   (нет)     — только s-ui-local (панель HTTP за reverse proxy без LE в compose).
#   cert      — одноразовая выдача: `docker compose --profile cert run ...` или `python run.py certbot`.
#   le        — фоновый certbot-renew. Включение: `SUI_RUN_COMPOSE_PROFILES=le` в run.env или
#               `docker compose --profile le up -d`.
---
services:
  s-ui-local:
    image: s-ui-local-hiddify
    container_name: s-ui-local
    build:
      context: .
      dockerfile: Dockerfile
      additional_contexts:
        core: ../../hiddify-core/hiddify-sing-box
      args:
        BUILDKIT_INLINE_CACHE: "1"
    hostname: "s-ui-local"
    network_mode: host
    environment:
      GODEBUG: ${GODEBUG:-http2xconnect=1}
      SUI_WEB_TLS_CERT: ${SUI_WEB_TLS_CERT:-/app/cert/fullchain.pem}
      SUI_WEB_TLS_KEY: ${SUI_WEB_TLS_KEY:-/app/cert/privkey.pem}
      SUI_TLS_SELF_SIGNED: ${SUI_TLS_SELF_SIGNED:-0}
      SUI_TLS_SELF_SIGNED_DAYS: ${SUI_TLS_SELF_SIGNED_DAYS:-36500}
      SUI_TLS_SELF_SIGNED_CN: ${SUI_TLS_SELF_SIGNED_CN:-localhost}
      SBOX_AWG_DISABLE_GSO: ${SBOX_AWG_DISABLE_GSO:-}
    volumes:
      - "./db:/app/db"
      - "./cert:/app/cert"
      - "letsencrypt_data:/etc/letsencrypt:ro"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    tty: true
    restart: unless-stopped
    entrypoint: "./entrypoint.sh"

  # Однократная выдача (не поднимается при up без profile):
  #   docker compose -f docker-compose.stand.yml --profile cert run --rm --service-ports certbot certonly --standalone \
  #     -d itvzlet.ai-qwerty.ru --email netort@internet.ru --agree-tos --non-interactive
  certbot:
    profiles: ["cert"]
    image: certbot/certbot:latest
    volumes:
      - letsencrypt_data:/etc/letsencrypt
    ports:
      - "80:80"

  # Раз в 12h: certbot renew; при успешном продлении — сигнал HUP контейнеру панели (перечитать TLS).
  # Без профиля `le` не поднимается (TLS у nginx / без авто-renew в compose).
  certbot-renew:
    profiles: ["le"]
    image: certbot/certbot:latest
    container_name: certbot-renew-sui-stand
    volumes:
      - letsencrypt_data:/etc/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        while true; do
          sleep 43200
          certbot renew -q --deploy-hook 'curl -fsS -X POST --unix-socket /var/run/docker.sock "http://localhost/v1.41/containers/s-ui-local/kill?signal=HUP"' || true
        done
    restart: unless-stopped

volumes:
  letsencrypt_data:

