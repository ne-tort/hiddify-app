# E2E: два клиента (REALITY + TUN) к рабочему хабу на VPS (порт 9440).
# Образ sing-box-l3router:local должен уже существовать (сборка хаба или:
#   docker build -f tmp/.../docker/Dockerfile -t sing-box-l3router:local .  из корня hiddify-sing-box)
#
#   docker compose -f docker-compose.l3router-e2e-reality.yml up -d

services:
  l3router-e2e-client1:
    image: sing-box-l3router:local
    container_name: l3router-e2e-client1
    network_mode: host
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./configs/client.reality-client1.json:/etc/sing-box/config.json:ro
    command: run -c /etc/sing-box/config.json

  l3router-e2e-client2:
    image: sing-box-l3router:local
    container_name: l3router-e2e-client2
    network_mode: host
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./configs/client.reality-client2.json:/etc/sing-box/config.json:ro
    command: run -c /etc/sing-box/config.json
    depends_on:
      - l3router-e2e-client1
