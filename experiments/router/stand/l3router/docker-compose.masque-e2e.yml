services:
  masque-server-core:
    build:
      context: .
      dockerfile: docker/Dockerfile.masque-e2e
      args:
        SINGBOX_ARTIFACT_STAMP: ${SINGBOX_ARTIFACT_STAMP:-0}
    image: sing-box-masque-e2e:local
    container_name: masque-server-core
    environment:
      # net/http HTTP/2: RFC 8441 Extended CONNECT (SETTINGS_ENABLE_CONNECT_PROTOCOL) for MASQUE on TCP.
      GODEBUG: http2xconnect=1
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ${MASQUE_SERVER_CONFIG:-./configs/masque-server.json}:/etc/sing-box/config.json:ro
      - ./configs/masque-cert.pem:/etc/sing-box/cert.pem:ro
      - ./configs/masque-key.pem:/etc/sing-box/key.pem:ro
    command: ["/usr/local/bin/sing-box", "run", "-c", "/etc/sing-box/config.json"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "ss -lun | awk '$4 ~ /:8443$/ {u=1} END {exit !u}' && ss -lnt | awk '$4 ~ /:8443$/ {t=1} END {exit !t}'",
        ]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s
    networks:
      masque-public:
      masque-backend:
        ipv4_address: 10.200.0.3

  masque-client-core:
    image: sing-box-masque-e2e:local
    container_name: masque-client-core
    environment:
      # net/http client HTTP/2: RFC 8441 Extended CONNECT (CONNECT-UDP / CONNECT-IP / CONNECT-stream).
      # Must match masque-server-core; without this, RoundTrip may reject or mishandle :protocol.
      GODEBUG: http2xconnect=1
    privileged: true
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ${MASQUE_CLIENT_CONFIG:-./configs/masque-client-connect-ip.json}:/etc/sing-box/config.json:ro
    command: ["/usr/local/bin/sing-box", "run", "-c", "/etc/sing-box/config.json"]
    depends_on:
      masque-server-core:
        condition: service_healthy
    networks:
      masque-public:

  iperf-server:
    image: sing-box-masque-e2e:local
    container_name: masque-iperf-server
    command: ["sleep", "infinity"]
    networks:
      masque-backend:
        ipv4_address: 10.200.0.2

networks:
  masque-public:
    driver: bridge
  masque-backend:
    driver: bridge
    ipam:
      config:
        - subnet: 10.200.0.0/24
