# Build: pack artifacts/sing-box-linux-amd64 (run `python run.py build` first).
# Source tree for artifact build: ../../../../hiddify-core/hiddify-sing-box (see l3router_stand/paths.py)

services:
  l3router-client-a:
    build:
      context: .
      dockerfile: docker/l3router-from-artifact.Dockerfile
    image: sing-box-l3router:local
    container_name: l3router-client-a
    network_mode: host
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./configs/client-a.static.json:/etc/sing-box/config.json:ro
    command: run -c /etc/sing-box/config.json

  l3router-client-b:
    image: sing-box-l3router:local
    container_name: l3router-client-b
    network_mode: host
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./configs/client-b.static.json:/etc/sing-box/config.json:ro
    command: run -c /etc/sing-box/config.json
