services:
  wireguard-go:
    image: masipcat/wireguard-go:latest
    container_name: wg-go-userspace
    cap_add:
      - NET_ADMIN
    # При host-сети sysctls из compose не задаются — при необходимости: sysctl -w net.ipv4.ip_forward=1 на хосте
    volumes:
      - /dev/net/tun:/dev/net/tun
      - ./wireguard:/etc/wireguard
    environment:
      - WG_COLOR_MODE=always
      - LOG_LEVEL=info
    # Слушает UDP 51820 прямо на сетевом стеке хоста (Linux). На Docker Desktop для Windows/Mac host network часто недоступен — нужен Linux-хост или WSL с docker engine.
    network_mode: host
    restart: unless-stopped
    # Не wg-quick: иначе при наличии модуля ядра поднимется kernel WireGuard, а не userspace.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        wireguard-go wg0
        sleep 0.5
        ip link set wg0 up
        wg setconf wg0 /etc/wireguard/wg0.core.conf
        ip addr add 10.66.66.1/24 dev wg0
        exec tail -f /dev/null
